<div class="flex flex-col p-xs pb-0">
	<mat-form-field appearance="outline" [hideRequiredMarker]="true">
		<mat-label>Range Start Date</mat-label>
		<input id="tmx-edr-start"
		  matInput
		  [value]="model.rangeStart ? (model.rangeStart | date:'M/d/yyyy, h:mm a') : ''"
		  (modelChange)="model.rangeStart = $event"
		  readonly
		  required>
		<button mat-icon-button matSuffix (click)="openDateTime('start')" tabindex="-1">
		  <mat-icon>launch</mat-icon>
		</button>
	</mat-form-field>
	
	<mat-form-field appearance="outline" [hideRequiredMarker]="true">
		<mat-label>Range End Date</mat-label>
		<input id="tmx-edr-end"
			matInput
		  [value]="model.rangeEnd ? (model.rangeEnd | date:'M/d/yyyy, h:mm a') : ''"
		  (modelChange)="model.rangeEnd = $event"
		  readonly
		  required>
		<button mat-icon-button matSuffix (click)="openDateTime('end')" tabindex="-1">
		  <mat-icon>launch</mat-icon>
		</button>
	</mat-form-field>
	<mat-error class="mat-error">{{ getErrorMessage() }}</mat-error>

	<mat-form-field appearance="outline" [hideRequiredMarker]="true">
		<mat-label>Reason</mat-label>
		<mat-select id="tmx-edr-reason"
			name="reason"
			cuiMatSelectAccessibility
			[(ngModel)]="model.excludedDateRangeReasonCode"
			required
			[disabled]="!model.rangeStart || !model.rangeEnd">
			@for (reason of reasonCodes; track reason) {
				<mat-option
					[value]="reason.code">{{ reason.description }}</mat-option>
			}
		</mat-select>
		<mat-error>
			<p>Please select a Reason</p>
		</mat-error>
	</mat-form-field>

	<mat-form-field appearance="outline" [hidden]="model.excludedDateRangeReasonCode !== 0" [hideRequiredMarker]="true">
		<mat-label>Description</mat-label>
		<input id="tmx-edr-desc"
			name="description"
			[(ngModel)]="model.description"
			type="text"
			matInput
			maxlength="50"
			[required]="model.excludedDateRangeReasonCode===0">
		<mat-error>
			<p>Please enter a Description for Other</p>
		</mat-error>
	</mat-form-field>
</div>
