<table mat-table
	   [dataSource]="dataSource"
	   class="cui-table mb-xxxl">
	<ng-container matColumnDef="start">
		<th mat-header-cell
			*matHeaderCellDef>Range Start</th>
		<td mat-cell
			*matCellDef="let item">{{ item.rangeStart | date: 'M/d/yyyy h:mm a' }}</td>
		<td mat-footer-cell
			*matFooterCellDef>
			<button mat-flat-button
					color="primary"
					(click)="addItem()"
					aria-label="Add excluded date range">
				Add
			</button>
		</td>
	</ng-container>
	<ng-container matColumnDef="end">
		<th mat-header-cell
			*matHeaderCellDef>Range End</th>
		<td mat-cell
			*matCellDef="let item">{{ item.rangeEnd | date: 'M/d/yyyy h:mm a' }}</td>
		<td mat-footer-cell
			*matFooterCellDef></td>
	</ng-container>
	<ng-container matColumnDef="reason">
		<th mat-header-cell
			*matHeaderCellDef
			colspan="2">Reason</th>
		<td mat-cell
			*matCellDef="let item"
			colspan="2">{{ getReasonDisplay(item) }}</td>
		<td mat-footer-cell
			*matFooterCellDef
			colspan="2"></td>
	</ng-container>
	<ng-container matColumnDef="actions"
				  sticky>
		<th mat-header-cell
			*matHeaderCellDef
			class="text-right">Options</th>
		<td mat-cell
			*matCellDef="let item, let i = index"
			class="text-right pr-xxs">
			<button mat-icon-button
					class="ml-xs"
					(click)="editItem(item, i)"
					aria-label="Edit row">
				<mat-icon>edit</mat-icon>
			</button>
			<button mat-icon-button
					class="ml-xs"
					(click)="deleteItem(item)"
					aria-label="Delete row">
				<mat-icon>delete_forever</mat-icon>
			</button>
		</td>
		<td mat-footer-cell
			*matFooterCellDef></td>
	</ng-container>
	<tr mat-header-row
		*matHeaderRowDef="columns; sticky: true"></tr>
	<tr mat-row
		*matRowDef="let row; columns: columns"></tr>
	<tr mat-footer-row
		*matFooterRowDef="columns; sticky: true"></tr>
</table>
