<mat-form-field appearance="outline" [hideRequiredMarker]="true" class="w-full">
	<mat-label>{{ label }}</mat-label>
	<input
		matInput
		[id]="id"
		[name]="name ? name : id"
		[disabled]="isDisabled"
		[(ngModel)]="model"
		(ngModelChange)="onTimeChange($event)"
		[matTimepicker]="picker"
		required
	>
	<mat-timepicker-toggle matSuffix [for]="picker"></mat-timepicker-toggle>
	<mat-timepicker #picker interval="1min" (selected)="onTimeChange($event)" ></mat-timepicker>
</mat-form-field>
