@if (menu._allItems?.length > 0) {
  <button mat-flat-button
    color="primary"
    [matMenuTriggerFor]="menu"
    (click)="$event.stopPropagation();">
    Actions
    <mat-icon matSuffix>arrow_drop_down</mat-icon>
  </button>
} @else {
  <button mat-flat-button
    color="primary"
    class="invisible">
    Actions
    <mat-icon matSuffix>arrow_drop_down</mat-icon>
  </button>
}


<mat-menu #menu="matMenu" class="cui-menu">

  @if (shouldDisplayMobileRegistration()) {
    <button mat-menu-item
      aria-label="Mobile Registration"
    (click)="openMobileRegistration()">Mobile Registration</button>
  }

  <!--Would eventually like to abstract this and the "features" mat-menu below out into an isolated re-usable component, but with the current design
  it doesn't work fully.  Hover and ngIf conditions based on menu item lengths don't work. -->
  @if (features._allItems?.length > 0) {
    <button mat-menu-item
      aria-label="Policy Enrolled Features"
      [matMenuTriggerFor]="features"
    >Enrolled Features</button>
  }

</mat-menu>

<mat-menu #features="matMenu">
  @for (obj of availableFeatures; track obj) {
    <a [disabled]="obj.isDisabled" mat-menu-item [routerLink]="obj.routerLink" [state]="{ policyNumber: (query.policy$ | async)?.policyNumber }">{{ obj.display }}</a>
  }
</mat-menu>
