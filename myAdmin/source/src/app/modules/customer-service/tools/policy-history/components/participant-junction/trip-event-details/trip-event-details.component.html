@if (dataSource.loading$ | async) {
  <cui-spinner
  tmxModalSpinner="tmx-policy-history-trip-event-details"></cui-spinner>
}

<table mat-table
  [dataSource]="dataSource"
  class="cui-table"
  matSort
  matSortActive="date"
  matSortDirection="asc"
  matSortDisableClear
  [hidden]="(dataSource.totalRecords$ | async) === undefined || (dataSource.totalRecords$ | async) === 0">
  <ng-container matColumnDef="date">
    <th mat-header-cell
      *matHeaderCellDef
      mat-sort-header
    [resizeColumn]="true">Event Date Time</th>
    <td mat-cell
      *matCellDef="let item"><span>{{ item.eventDate | date: formats.DATE_TIME_LONG }}</span></td>
      <td mat-footer-cell
        *matFooterCellDef
        colspan="3">
        <div class="flex justify-end">
          <button mat-flat-button color="primary"	class="ml-xxs header-search-button" (click)="getCsvFileExport()">Export to CSV</button>
          <mat-paginator [length]="dataSource.totalRecords$ | async"
            [pageIndex]="0"
            [pageSize]="500"
          [pageSizeOptions]="[10, 25, 100, 500, 1000]"></mat-paginator>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="speed">
      <th mat-header-cell
        *matHeaderCellDef
        class="text-center"
      [resizeColumn]="true">Speed (MPH)</th>
      <td mat-cell
        *matCellDef="let item"
        class="text-center"><span>{{ item.speed }}</span></td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell
          *matHeaderCellDef
          [resizeColumn]="true">
          <div>
            <mat-form-field appearance="outline">
              <mat-label>Event Description</mat-label>
              <input #input
                id="te-filter"
                type="text"
                matInput>
              </mat-form-field>
            </div>
          </th>
          <td mat-cell
            *matCellDef="let item"><span>{{ item.description }}</span></td>
          </ng-container>
          <tr mat-header-row
          *matHeaderRowDef="columns; sticky: true"></tr>
          <tr mat-row
          *matRowDef="let row; columns: columns"></tr>
          <tr mat-footer-row
          *matFooterRowDef="['date']; sticky: true"></tr>
        </table>

        <mat-card appearance="outlined" [hidden]="(dataSource.totalRecords$ | async) > 0">
          <tmx-empty-state icon="edit_road"
            primaryText="Trip Events"
          secondaryText="There doesn't seem to be any events for this trip"></tmx-empty-state>
        </mat-card>
