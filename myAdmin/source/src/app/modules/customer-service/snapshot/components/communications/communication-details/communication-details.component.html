<table mat-table [dataSource]="dataSource" class="cui-table">
	<ng-container matColumnDef="create">
		<th mat-header-cell *matHeaderCellDef>Sent</th>
		<td mat-cell *matCellDef="let item">{{ item.processedDate | date: 'M/d/yyyy' }}</td>
	</ng-container>
	<ng-container matColumnDef="method">
		<th mat-header-cell *matHeaderCellDef>Method</th>
		<td mat-cell *matCellDef="let item">{{ item.method }}</td>
	</ng-container>
	<ng-container matColumnDef="reason">
		<th mat-header-cell *matHeaderCellDef>Type/Reason</th>
		<td mat-cell *matCellDef="let item">
			{{ item.campaign }}<br />{{ item.reason }}</td>
	</ng-container>
	<ng-container matColumnDef="serialNumber">
		<th mat-header-cell *matHeaderCellDef>Device</th>
		<td mat-cell *matCellDef="let item">{{ item.deviceSerialNumber }}</td>
	</ng-container>
	<tr mat-header-row *matHeaderRowDef="columns"></tr>
	<tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
