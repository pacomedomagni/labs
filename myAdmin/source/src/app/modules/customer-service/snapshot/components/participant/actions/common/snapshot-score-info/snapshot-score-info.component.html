@if (data.scoreData?.ubiScore !== 0) {
  <tmx-data-list>
    <tmx-data-list-row labelSpan="40" label="UBI Value">{{ data.scoreData?.ubiValue }}</tmx-data-list-row>
    <tmx-data-list-row labelSpan="40" label="Connected Days">{{ data.scoreData?.connectedSeconds / 86400 | number: '1.0-2' }}</tmx-data-list-row>
    @if (!data.isMobile) {
      <tmx-data-list-row labelSpan="40" label="Disconnected Days">{{ data.scoreData?.disconnectedSeconds / 86400 | number: '1.0-2' }}</tmx-data-list-row>
      <tmx-data-list-row labelSpan="40" label="Disconnected Count">{{ data.scoreData?.disconnectCount }}</tmx-data-list-row>
    }
  </tmx-data-list>
} @else {
  <tmx-empty-state icon="edit_road"
    primaryText="UBI Value"
    secondaryText="No connectivity found, unable to calculate UBI Value">
  </tmx-empty-state>
}
