<div class="mb-xs">
	'Stop Shipment' cancels the device shipment request and updates the participant's Status.<br/>
	Use the table below to determine which Status to select for the given situation:
</div>

<table mat-table [dataSource]="dataSource" class="cui-table">
	<ng-container matColumnDef="scenario">
		<th mat-header-cell *matHeaderCellDef>Scenario</th>
		<td mat-cell *matCellDef="let item">{{ item.scenario }}</td>
	</ng-container>
	<ng-container matColumnDef="selection">
		<th mat-header-cell *matHeaderCellDef class="w-1/3">Selection</th>
		<td mat-cell *matCellDef="let item">{{ item.selection }}</td>
	</ng-container>
	<tr mat-header-row *matHeaderRowDef="columns"></tr>
	<tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
