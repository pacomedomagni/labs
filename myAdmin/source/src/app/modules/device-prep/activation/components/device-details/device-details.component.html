<table mat-table [dataSource]="dataSource" class="cui-table">
	<ng-container matColumnDef="serialNumber">
		<th mat-header-cell *matHeaderCellDef>Device Serial Number</th>
		<td mat-cell *matCellDef="let item">{{ item.serialNumber }}</td>
	</ng-container>
	<ng-container matColumnDef="sim">
		<th mat-header-cell *matHeaderCellDef>SIM ID</th>
		<td mat-cell *matCellDef="let item">{{ item.sim }}</td>
	</ng-container>
	<ng-container matColumnDef="status">
		<th mat-header-cell *matHeaderCellDef>SIM Status</th>
		<td mat-cell *matCellDef="let item">{{ helperSerivce.getExtender(item, "SIMStatus") }}</td>
	</ng-container>
	<tr mat-header-row *matHeaderRowDef="columns"></tr>
	<tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
