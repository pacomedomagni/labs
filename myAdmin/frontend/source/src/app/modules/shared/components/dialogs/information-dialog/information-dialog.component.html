<cui-dialog closeButtonLabel="Close Dialog" [showClose]="true" [showFooter]="true" (close)="onClose()">
  <div mat-dialog-title dialog-header class="flex">
    <span>{{ data.title }}</span>
    @if (data.helpKey) {
      <tmx-help-text class="my-auto ml-xxs" [helpKey]="data.helpKey"></tmx-help-text>
    }
  </div>
  @if (shouldDisplaySubtitle()) {
    <cui-notification-banner dialog-sub-header type="info">
      <span [innerHTML]="data.subtitle"></span>
    </cui-notification-banner>
  }
  <div mat-dialog-content dialog-content class="mt-xxs">
    <ng-container *ngComponentOutlet="data.component; injector: contentInjector"></ng-container>
  </div>
  <ng-container dialog-footer>
    <button mat-flat-button color="primary" class="mr-xxs" id="btn-confirm" (click)="onConfirm()">
      {{ data.confirmText }}
    </button>
    @if (!data.hideCancelButton) {
      <button mat-stroked-button color="primary" id="btn-cancel" (click)="onCancel()">
        {{ data.cancelText }}
      </button>
    }
  </ng-container>
</cui-dialog>
