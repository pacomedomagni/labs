<tmx-policy-search [showPolicySearch]="true" (policySearch)="searchByPolicyNumber($event)"
  [showSerialNumberSearch]="true" (serialNumberSearch)="searchBySerialNumber($event)"
  [showMobileIdentifierSearch]="true" (mobileIdentifierSearch)="searchByMobileIdentifier($event)"
  [showPhoneNumberSearch]="true" (phoneNumberSearch)="searchByPhoneNumber($event)"
  [showEmptyDataPanel]="policyData === undefined && (query.multiPolicy$ | async) === undefined"
  [showSearchErrorPanel]="searchHasErrors" [searchErrorMessage]="searchErrorMessage">
</tmx-policy-search>

<tmx-customer-service-cross-app-banner [currentFeature]="features.Snapshot" [policyNumber]="policyData?.policyNumber">
</tmx-customer-service-cross-app-banner>

@if (policyData && !searchHasErrors) {
  <div class="flex flex-wrap justify-center pt-xxs" [@fadeAnim]>
    <tmx-snapshot-policy-details class="mx-auto pb-xxs"></tmx-snapshot-policy-details>
    <mat-accordion #participantDetailsAccordion="matAccordion" multi class="participant-accordion mx-auto"
      [@.disabled]="disableAnimation">
      @for (participant of (query.policy$ | async)?.participants; track participantTracker(i, participant); let i = $index) {
        <tmx-snapshot-participant-details
          [participant]="participant"
        [label]="(query.policy$ | async)?.participants.length > 1 ? '(' + (i + 1) + ' of ' + (query.policy$ | async)?.participants.length +')' : undefined"></tmx-snapshot-participant-details>
      }
    </mat-accordion>
  </div>
}

@if (!searchHasErrors && (query.multiPolicy$ | async)) {
  <div [@fadeAnim]>
    <tmx-snapshot-multi-policy-details class="mx-auto pb-xxs"></tmx-snapshot-multi-policy-details>
  </div>
}
