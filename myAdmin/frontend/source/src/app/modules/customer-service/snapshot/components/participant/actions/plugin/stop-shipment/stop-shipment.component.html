<div class="flex flex-col p-xs pb-0">
  <div>
    <span>Select from the options below to Stop Shipment:</span>
  </div>
  <div>
    <mat-radio-group
      class="radio-group" required
      [(ngModel)]="model.stopShipmentMethod">
      @for (option of options; track option) {
        <mat-radio-button class="radio-button" [value]="option">
          {{option}}
        </mat-radio-button>
      }
    </mat-radio-group>
  </div>
</div>
