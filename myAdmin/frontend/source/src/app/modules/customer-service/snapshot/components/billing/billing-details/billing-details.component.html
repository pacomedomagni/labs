<table mat-table [dataSource]="dataSource" class="cui-table">
  <ng-container matColumnDef="create">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let item">{{ item.createDate | date: 'M/d/yyyy h:mm:ss a' }}</td>
  </ng-container>
  <ng-container matColumnDef="serialNumber">
    <th mat-header-cell *matHeaderCellDef>Device</th>
    <td mat-cell *matCellDef="let item">{{ item.deviceSerialNumber }}</td>
  </ng-container>
  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let item">{{ item.description }}</td>
  </ng-container>
  <ng-container matColumnDef="amount">
    <th mat-header-cell *matHeaderCellDef>Amount</th>
    <td mat-cell *matCellDef="let item">{{ item.amount | currency }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let item, let i = index" class="text-right">
      @if (shouldDisplayFeeReversal(item)) {
        <button mat-flat-button color="primary" (click)="reverseFee(item)"
        aria-label="Fee Reversal">Reverse</button>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
