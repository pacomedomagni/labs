<div class="flex flex-col p-xs pb-0"> 
	<div class="flex flex-col" [hidden]="!preCheckCompleted || !preCheckPassed">
		<mat-form-field appearance="outline" [hideRequiredMarker]="true">
			<mat-label>Current Enrollment Date</mat-label>
			<input matInput [matDatepicker]="startPicker" [value]="currentEnrollmentDate" [disabled]="true">
			<mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
			<mat-datepicker #startPicker></mat-datepicker>
		</mat-form-field>
	
		<mat-form-field appearance="outline" [hideRequiredMarker]="true">
			<mat-label>New Enrollment Date</mat-label>
			<input matInput [matDatepicker]="endPicker" [(ngModel)]="model.enrollmentDate" [min]="minDate" [max]="maxDate" required>
			<mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
			<mat-datepicker #endPicker></mat-datepicker>
			<mat-error>Date must be between {{ minDate | date: 'M/d/yyyy' }} and {{ maxDate | date: 'M/d/yyyy' }}</mat-error>
		</mat-form-field>
	</div>

	<tmx-empty-state 
		[hidden]="preCheckCompleted"
		icon="sync"
		primaryText="Eligibility check in process"
		secondaryText="Please wait...">
	</tmx-empty-state>

	<tmx-empty-state 
		[hidden]="!preCheckCompleted || preCheckPassed"
		icon="lock"
		primaryText="Cannot Change Enrollment Date"
		[secondaryText]="preCheckError">
	</tmx-empty-state>
</div>
