<table mat-table [dataSource]="dataSource" class="cui-table">
	<ng-container matColumnDef="create">
		<th mat-header-cell *matHeaderCellDef>Create Date</th>
		<td mat-cell *matCellDef="let item">{{ item.createDateTime | date: 'M/d/yyyy' }}</td>
	</ng-container>
	<ng-container matColumnDef="type">
		<th mat-header-cell *matHeaderCellDef>Type</th>
		<td mat-cell *matCellDef="let item">{{ query.getCompatibilityReasonDisplay(item.compatibilityTypeCode) }}</td>
	</ng-container>
	<ng-container matColumnDef="description">
		<th mat-header-cell *matHeaderCellDef>Description</th>
		<td mat-cell *matCellDef="let item"> {{ item.detailedDescription }}</td>
	</ng-container>
	<ng-container matColumnDef="actions" sticky>
		<th mat-header-cell *matHeaderCellDef class="text-right"></th>
		<td mat-cell *matCellDef="let item" class="text-right pr-xxs">
			<button
				mat-icon-button
				class="ml-xs"
				(click)="editItem(item)"
				aria-label="Edit row">
				<mat-icon>edit</mat-icon>
			</button>
		</td>
		<td mat-footer-cell *matFooterCellDef></td>
	</ng-container>
	<tr mat-header-row *matHeaderRowDef="columns"></tr>
	<tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
