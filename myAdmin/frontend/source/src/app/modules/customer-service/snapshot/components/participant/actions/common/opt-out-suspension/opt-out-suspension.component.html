<div class="modal-table-container mb-xxs">
	<table mat-table [dataSource]="dataSource" class="cui-table" matSort matSortActive="date" matSortDirection="asc" matSortDisableClear>
		<ng-container matColumnDef="start">
			<th mat-header-cell *matHeaderCellDef>Begin Date</th>
			<td mat-cell *matCellDef="let item">{{ item.startDate | date: 'M/d/yyyy' }}</td>
		</ng-container>
		<ng-container matColumnDef="end">
			<th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
			<td mat-cell *matCellDef="let item">{{ item.endDate | date: 'M/d/yyyy' }}</td>
		</ng-container>
		<ng-container matColumnDef="device">
			<th mat-header-cell *matHeaderCellDef>Device</th>
			<td mat-cell *matCellDef="let item">{{ item.deviceSerialNumber }}</td>
		</ng-container>
		<ng-container matColumnDef="canceled">
			<th mat-header-cell *matHeaderCellDef>Canceled</th>
			<td mat-cell *matCellDef="let item">{{ item.isCancelled|yesNo }}</td>
		</ng-container>
		<ng-container matColumnDef="returned">
			<th mat-header-cell *matHeaderCellDef>Returned</th>
			<td mat-cell *matCellDef="let item">{{ item.isReturned|yesNo }}</td>
		</ng-container>
		<ng-container matColumnDef="user">
			<th mat-header-cell *matHeaderCellDef>User</th>
			<td mat-cell *matCellDef="let item">{{ item.userName }}</td>
		</ng-container>
		<tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
		<tr mat-row *matRowDef="let row; columns: columns"></tr>
	</table>
</div>
<div class="flex mb-xxs">
	<button mat-flat-button color="primary" (click)="addItem()" aria-label="Add opt out suspension" class="mr-xxs">
		Add Suspension
	</button>
	<button mat-flat-button color="primary" (click)="deleteItem()" [disabled] ="shouldDisableCancelButton()" aria-label="Cancel opt out suspension">
		Cancel Suspension(s)
	</button>
</div>
