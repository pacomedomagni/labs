<div class="flex flex-col p-xs pb-0">
  <mat-form-field appearance="outline" [hideRequiredMarker]="true" style="width: 100%;">
    <mat-label>Unenrollment Reason</mat-label>
    <mat-select id="unenrollment-reason" name="type" cuiMatSelectAccessibility [(ngModel)]="selectedReason" required>
      @for (reason of model.unenrollmentReasons; track reason) {
        <mat-option [value]="reason">
          {{ reason }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
