<div class="date-time-control">
    <div class="inputs">
        <mat-form-field appearance="outline" [hideRequiredMarker]="true">
            <mat-label>{{ label || 'Date' }}</mat-label>
            <input
                matInput
                [matDatepicker]="datePicker"
                [disabled]="isDisabled"
                [id]="id + '-date'"
                [max]="max"
                [min]="min"
                [required]="isRequired"
                [errorStateMatcher]="dateErrorStateMatcher"
                [(ngModel)]="dateValue"
                [ngModelOptions]="{ standalone: true }"
                (dateChange)="onDateChange($event.value)"
                (input)="onDateInput($event)"
                (blur)="onDateBlur()"
            />
            <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
            <mat-datepicker #datePicker></mat-datepicker>
            @if (invalidDateFormat) {
                <mat-error>Invalid date format. Please use MM/DD/YYYY.</mat-error>
            }
        </mat-form-field>

        <mat-form-field appearance="outline" [hideRequiredMarker]="true">
            <mat-label>Time</mat-label>
            <input
                matInput
                [matTimepicker]="timePicker"
                [disabled]="isDisabled"
                [id]="id + '-time'"
                [required]="isRequired"
                [errorStateMatcher]="timeErrorStateMatcher"
                #timeInputRef
                [(ngModel)]="timeInput"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="onTimeInputChange($event)"
                (blur)="onTimeBlur()"
            />
            <mat-timepicker-toggle matSuffix [for]="timePicker"></mat-timepicker-toggle>
            <mat-timepicker #timePicker interval="1min" (selected)="onTimeSelected($event)"></mat-timepicker>
            @if (invalidTimeFormat) {
                <mat-error>Invalid time format. Please use HH:MM AM/PM.</mat-error>
            }
        </mat-form-field>
    </div>

    @if (displayError && errorMessage) {
        <mat-error>{{ errorMessage }}</mat-error>
    }
</div>
